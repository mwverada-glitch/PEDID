<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login/Register Popup</title>

<style>
    body {
        font-family: "Prompt", sans-serif;
        margin: 0;
        background: #f3f5fc;
    }

    /* --- MODAL WRAPPER --- */
    .modal {
        display: none;
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(4px);
        background: rgba(0, 0, 0, 0.35);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    /* --- POPUP CARD --- */
    .modal-content {
        width: 420px;
        background: #fff;
        border-radius: 22px;
        padding: 25px 35px;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.15);
        position: relative;
        animation: fadeIn .25s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .close {
        position: absolute;
        right: 20px;
        top: 18px;
        cursor: pointer;
        font-size: 22px;
    }

    /* --- TABS --- */
    .tabs {
        display: flex;
        margin-bottom: 25px;
        border-radius: 14px;
        background: #e8e9ff;
        padding: 4px;
    }
    .tab {
        flex: 1;
        padding: 12px;
        text-align: center;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }
    .tab.active {
        background: linear-gradient(135deg, #8f85ff, #6f79ff);
        color: #fff;
        box-shadow: 0 3px 10px rgba(111, 121, 255, 0.4);
    }

    label {
        display: block;
        margin-top: 10px;
        font-size: 14px;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #ccc;
        margin-top: 6px;
        font-size: 15px;
    }

    .password-box {
        position: relative;
    }

    .toggle-eye {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
    }

    /* --- BUTTON --- */
    .submit-btn {
        width: 100%;
        padding: 12px;
        border: none;
        margin-top: 25px;
        font-size: 16px;
        color: #fff;
        border-radius: 12px;
        cursor: pointer;
        background: linear-gradient(135deg, #6f79ff, #8f85ff);
        box-shadow: 0 4px 15px rgba(111, 121, 255, 0.4);
    }

</style>
</head>

<body>

<!-- DEMO BUTTONS -->
<button onclick="openModal('login')" style="padding:10px 20px; margin:50px;">เข้าสู่ระบบ</button>
<button onclick="openModal('register')" style="padding:10px 20px;">ลงทะเบียน</button>


<!-- POPUP -->
<div id="popupModal" class="modal">
    <div class="modal-content">

        <span class="close" onclick="closeModal()">&times;</span>

        <!-- Tabs -->
        <div class="tabs">
            <div id="tabLogin" class="tab active" onclick="switchTab('login')">เข้าสู่ระบบ</div>
            <div id="tabRegister" class="tab" onclick="switchTab('register')">ลงทะเบียน</div>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">

            <label>อีเมล</label>
            <input type="email" placeholder="กรอกอีเมล">

            <label>รหัสผ่าน</label>
            <div class="password-box">
                <input type="password" id="loginPass" placeholder="รหัสผ่าน">
                <span class="toggle-eye" onclick="togglePassword('loginPass')">👁</span>
            </div>

            <button class="submit-btn">เข้าสู่ระบบ</button>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" style="display:none;">

            <label>ชื่อ-นามสกุล</label>
            <input type="text" placeholder="ชื่อจริง-นามสกุล">

            <label>อีเมล</label>
            <input type="email" placeholder="กรอกอีเมล">

            <label>รหัสผ่าน</label>
            <div class="password-box">
                <input type="password" id="regPass1" placeholder="รหัสผ่าน">
                <span class="toggle-eye" onclick="togglePassword('regPass1')">👁</span>
            </div>

            <label>ยืนยันรหัสผ่าน</label>
            <div class="password-box">
                <input type="password" id="regPass2" placeholder="ยืนยันรหัสผ่าน">
                <span class="toggle-eye" onclick="togglePassword('regPass2')">👁</span>
            </div>

            <button class="submit-btn">ลงทะเบียน</button>
        </div>

    </div>
</div>

<script>
/* --- OPEN MODAL --- */
function openModal(mode) {
    document.getElementById("popupModal").style.display = "flex";
    switchTab(mode);
}

/* --- CLOSE MODAL --- */
function closeModal() {
    document.getElementById("popupModal").style.display = "none";
}

/* --- TOGGLE PASSWORD --- */
function togglePassword(id) {
    let field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

/* --- SWITCH TAB --- */
function switchTab(tab) {
    const loginTab = document.getElementById("tabLogin");
    const regTab = document.getElementById("tabRegister");
    const loginForm = document.getElementById("loginForm");
    const regForm = document.getElementById("registerForm");

    if (tab === "login") {
        loginTab.classList.add("active");
        regTab.classList.remove("active");
        loginForm.style.display = "block";
        regForm.style.display = "none";
    } else {
        regTab.classList.add("active");
        loginTab.classList.remove("active");
        loginForm.style.display = "none";
        regForm.style.display = "block";
    }
}

/* --- CLOSE WHEN CLICK OUTSIDE --- */
window.onclick = function(event) {
    const modal = document.getElementById("popupModal");
    if (event.target === modal) closeModal();
};
</script>

</body>
</html>
