<input type="text" id="searchInput" placeholder="ค้นหา...">
<div id="searchResults"></div>
<script>
const fuse = new Fuse(topics, {
  keys: ["title", "category"],  // ค้นได้หลายฟิลด์
  threshold: 0.4                // 0 = แม่นมาก, 0.4 = ยืดหยุ่นดีสุด
});

document.getElementById("searchInput").addEventListener("input", function () {
  const keyword = this.value;
  const results = fuse.search(keyword);

  let html = "";

  if (keyword === "") {
    document.getElementById("searchResults").innerHTML = "";
    return;
  }

  if (results.length === 0) {
    html = `<p>ไม่พบผลลัพธ์</p>`;
  } else {
    results.forEach(r => {
      html += `
        <div class="result-item">
          <a href="${r.item.url}">
            <strong>${r.item.title}</strong><br>
            <small>${r.item.category}</small>
          </a>
        </div>
      `;
    });
  }

  document.getElementById("searchResults").innerHTML = html;
});
</script>
<style>
#searchInput {
  width: 70%;
  padding: 12px;
  border-radius: 10px;
  border: 2px solid #7ec8d4;
}

.result-item {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
.result-item a {
  color: #0b7285;
  text-decoration: none;
}
</style>
